# Hunch Oracle Desk — hosting for the CROO agents.
#
# Four long-lived processes from ONE image (see Dockerfile). Each seller worker
# authenticates as exactly ONE CROO agent (one SDK key) and answers only that
# agent's services — which is why three listings means three workers, not one.
#
#   worker-oracle     → "Hunch Oracle"       forecast, sentiment, research, scorecard
#   worker-truthcheck → "Hunch TruthCheck"   verify, watch
#   worker-marketdesk → "Hunch Market Desk"  spawn, hedge-quote, portfolio-hedge
#   buyer             → "hunch buyer"        the requester side (capped, dry-run by default)
#
# `scorecard` lives with `forecast` on purpose: it scores forecasts out of the
# ledger the forecast handler writes, so they must share a worker + volume.
#
# Setup:  cp .env.example .env  &&  fill in 3 seller keys + the service ids
# Run:    docker compose up -d --build
# Verify: curl localhost:8080/healthz  (8081 truthcheck, 8082 marketdesk)

x-oracle: &base
  build: .
  image: hunch-oracle:latest
  restart: unless-stopped
  env_file: .env

# Healthcheck shared by every seller worker: /healthz is 200 only while the CROO
# websocket is connected (503 when dropped), so Docker restarts an agent that
# has gone OFFLINE. Uses node — there is no curl in the slim image.
x-healthcheck: &healthcheck
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 20s

services:
  worker-oracle:
    <<: *base
    environment:
      CROO_SDK_KEY: ${CROO_ORACLE_SDK_KEY}
      ORACLE_SERVICE_MAP: ${ORACLE_MAP_ORACLE}
      ORACLE_HEALTH_PORT: "8080"
      # Track record: the forecast handler appends here; `scorecard` reads it.
      ORACLE_LEDGER_PATH: /app/data/track-record.jsonl
    ports:
      - "8080:8080"
    volumes:
      - oracle-data:/app/data
    healthcheck:
      <<: *healthcheck
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:8080/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"

  worker-truthcheck:
    <<: *base
    environment:
      CROO_SDK_KEY: ${CROO_TRUTHCHECK_SDK_KEY}
      ORACLE_SERVICE_MAP: ${ORACLE_MAP_TRUTHCHECK}
      ORACLE_HEALTH_PORT: "8081"
    ports:
      - "8081:8081"
    healthcheck:
      <<: *healthcheck
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:8081/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"

  worker-marketdesk:
    <<: *base
    environment:
      CROO_SDK_KEY: ${CROO_MARKETDESK_SDK_KEY}
      ORACLE_SERVICE_MAP: ${ORACLE_MAP_MARKETDESK}
      ORACLE_HEALTH_PORT: "8082"
    ports:
      - "8082:8082"
    healthcheck:
      <<: *healthcheck
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:8082/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"

  # The requester side: a long-lived loop, not an HTTP server — no port, no
  # healthcheck. It hires EXTERNAL counterparties (an agent cannot hire itself),
  # so it depends on none of the workers. Dry-run until SIGNAL_BUYER_ENABLED=true.
  buyer:
    <<: *base
    command: ["pnpm", "--filter", "@hunch/oracle", "signal-buyer-loop"]

volumes:
  oracle-data:
