[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hunch-cap-client"
version = "0.1.0"
description = "Hire the Hunch Oracle Desk from any Python agent in ~15 lines: money-backed forecasts, ground-truth verification, market spawning, and non-custodial hedges over CROO's Agent Protocol (CAP), settled in USDC on Base."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.8"
keywords = ["croo", "cap", "agent", "prediction-market", "oracle", "base", "usdc", "hunch"]
authors = [{ name = "Hunch", email = "team@playhunch.xyz" }]
classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Typing :: Typed",
]
# Zero runtime dependencies — stdlib only, by design.
dependencies = []

[project.urls]
Homepage = "https://github.com/rajkaria/hunch-croo"
Repository = "https://github.com/rajkaria/hunch-croo"
Documentation = "https://hunch-oracle-desk.vercel.app/docs"

[project.optional-dependencies]
# The test suite also runs under plain `python -m unittest` (no install needed).
dev = ["pytest"]

[tool.hatch.build.targets.wheel]
packages = ["hunch_cap_client"]
