# Hunch Oracle Desk — hosting for the CROO agent + its signal-buyer.
#
# Two long-lived processes from one image (see Dockerfile):
#   worker : the provider desk. Holds the WebSocket to CROO, so the seller agent
#            shows ONLINE on agent.croo.network and answers every service in
#            ORACLE_SERVICE_MAP.
#   buyer  : the requester side. Hires the human-curated allowlist on a capped
#            interval, so the "hunch buyer" agent shows recurring orders/volume
#            instead of an empty card. Dry-run until SIGNAL_BUYER_ENABLED=true.
#
# Setup:  cp .env.example .env  &&  fill it in  (see docs/DEPLOY.md)
# Run:    docker compose up -d --build
# Verify: curl localhost:8080/healthz   → 200 once the WS is connected

x-oracle: &oracle
  build: .
  image: hunch-oracle:latest
  restart: unless-stopped
  env_file: .env

services:
  worker:
    <<: *oracle
    environment:
      # Force the ops server on and point the ledger at the mounted volume,
      # regardless of what .env says.
      ORACLE_HEALTH_PORT: "8080"
      ORACLE_LEDGER_PATH: /app/data/track-record.jsonl
    ports:
      - "8080:8080" # JSON /healthz + /status, Prometheus /metrics
    volumes:
      - oracle-data:/app/data
    healthcheck:
      # /healthz returns 503 when the CROO WS is dropped, 200 when connected —
      # so Docker restarts a desk that has gone offline. Uses node (no curl in
      # the slim image).
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://127.0.0.1:8080/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  buyer:
    <<: *oracle
    # The requester side is a long-lived loop, not an HTTP server — no ports,
    # no healthcheck. It hires EXTERNAL counterparties (an agent cannot hire
    # itself), so it does not depend on the worker.
    command: ["pnpm", "--filter", "@hunch/oracle", "signal-buyer-loop"]

volumes:
  oracle-data:
